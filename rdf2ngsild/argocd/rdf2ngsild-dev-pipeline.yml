apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rdf2ngsild-dev-pipeline
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jicarretero/gitops-jicg.git
    targetRevision: HEAD
    path: rdf2ngsild/dev
  destination: 
    server: https://kubernetes.default.svc
    namespace: rdf2ngsild-namespace
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
